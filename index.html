<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>应用支持中心</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 60px;
        }
        h1 {
            font-size: 3em;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        .subtitle {
            font-size: 1.3em;
            opacity: 0.95;
            font-weight: 300;
        }
        .apps-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }
        .app-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            transition: transform 0.3s;
        }
        .app-card:hover {
            transform: translateY(-5px);
        }
        .app-icon {
            font-size: 4em;
            text-align: center;
            margin-bottom: 20px;
        }
        .app-name {
            font-size: 1.8em;
            font-weight: bold;
            color: #667eea;
            text-align: center;
            margin-bottom: 10px;
        }
        .app-desc {
            text-align: center;
            color: #666;
            margin-bottom: 25px;
            line-height: 1.8;
        }
        .app-links {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .app-link {
            display: block;
            padding: 12px;
            background: #f8f9ff;
            color: #667eea;
            text-align: center;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 500;
            transition: background 0.3s;
        }
        .app-link:hover {
            background: #667eea;
            color: white;
        }
        .footer {
            text-align: center;
            margin-top: 60px;
            color: white;
            opacity: 0.8;
        }
        .footer a {
            color: white;
            text-decoration: none;
        }
        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📱 应用支持中心</h1>
            <p class="subtitle">隐私政策、技术支持与应用文档</p>
        </div>

        <div class="apps-grid">
            <!-- 沉浸阅读 -->
            <div class="app-card">
                <div class="app-icon">📚</div>
                <div class="app-name">沉浸阅读</div>
                <div class="app-desc">专为深度阅读而生的电子书阅读器</div>
                <div class="app-links">
                    <a href="dc-reader/index.html" class="app-link">📖 应用主页</a>
                    <a href="dc-reader/support.html" class="app-link">🛠 技术支持</a>
                    <a href="dc-reader/privacy.html" class="app-link">🔒 隐私政策</a>
                </div>
            </div>

            <!-- FujiCam -->
            <div class="app-card">
                <div class="app-icon">📸</div>
                <div class="app-name">FujiCam</div>
                <div class="app-desc">找回胶片时代纯粹的摄影乐趣</div>
                <div class="app-links">
                    <a href="FujiCam/index.html" class="app-link">📷 应用主页</a>
                    <a href="FujiCam/support.html" class="app-link">🛠 技术支持</a>
                    <a href="FujiCam/privacy.html" class="app-link">🔒 隐私政策</a>
                </div>
            </div>
        </div>

        <div class="footer">
            <p>© 2026 All rights reserved.</p>
            <p style="margin-top: 10px;">
                <a href="https://github.com/daichuan/app-support-pages">GitHub</a>
            </p>
        </div>
    </div>
</body>
</html>
